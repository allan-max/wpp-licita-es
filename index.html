<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel do Bot de Licitações</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
    h1 { color: #89b4fa; }
    .terminal { background-color: #11111b; padding: 15px; border-radius: 8px; height: 400px; overflow-y: auto; font-family: monospace; border: 1px solid #313244; }
    .log-line { margin: 5px 0; border-bottom: 1px solid #313244; padding-bottom: 3px;}
    
    #btn-atualizar {
      display: none; 
      background-color: #a6e3a1; color: #11111b; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 100%;
    }
    #btn-atualizar:hover { background-color: #94e289; }
  </style>
</head>
<body>

  <button id="btn-atualizar">✨ Nova Atualização Baixada! Clique aqui para Instalar.</button>

  <h1>Painel de Controle</h1>
  <p>Status: <span style="color: #a6e3a1;">Rodando em Segundo Plano</span></p>

  <div class="terminal" id="terminal-logs">
    <div class="log-line">Aguardando inicialização do sistema...</div>
  </div>

  <script>
    const terminal = document.getElementById('terminal-logs');
    const btnAtualizar = document.getElementById('btn-atualizar');

    // Escuta os logs chegando do Node.js
    window.api.receberLog((event, texto) => {
      const novaLinha = document.createElement('div');
      novaLinha.className = 'log-line';
      novaLinha.innerText = texto;
      terminal.appendChild(novaLinha);
      terminal.scrollTop = terminal.scrollHeight; // Rola para baixo automático
    });

    // Escuta aviso de atualização pronta
    window.api.receberAvisoAtualizacao(() => {
      btnAtualizar.style.display = 'block'; // Mostra o botão verde gigante
    });

    // Envia comando para fechar e atualizar
    btnAtualizar.addEventListener('click', () => {
      btnAtualizar.innerText = "Instalando... O app vai reiniciar.";
      window.api.aplicarAtualizacao();
    });
  </script>
</body>
</html>
